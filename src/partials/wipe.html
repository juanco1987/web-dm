<!-- Cortina de Transición — DoorMaster -->
<div class="page-transition-wipe" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #020c1b; z-index: 9999; transform: translate3d(0, 100%, 0); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none;">

    <div class="transition-door-scene" style="display: none; align-items: center; justify-content: center;">

        <div class="door-master-container">

            <div class="door-brand-text">DOOR<span class="door-brand-accent">MASTER</span></div>

            <!-- Puerta SVG (resto de páginas) -->
            <div class="door-visual door-visual--svg door-wrapper">

                <div class="door-light" style="
                    position: absolute; top: 4%; left: 12%; width: 76%; height: 92%;
                    background: radial-gradient(ellipse at 8% 50%, rgba(100,255,218,0.25) 0%, rgba(100,255,218,0.07) 45%, transparent 75%);
                    opacity: 0; pointer-events: none; border-radius: 3px;
                "></div>

                <svg viewBox="0 0 100 140" style="
                    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                    overflow: visible; pointer-events: none; z-index: 2;
                    filter: drop-shadow(0 0 10px rgba(100,255,218,0.2));
                ">
                    <path d="M 12 5 L 12 133 M 88 5 L 88 133 M 12 5 L 88 5"
                          stroke="rgba(255,255,255,0.6)" stroke-width="5"
                          stroke-linecap="round" fill="none"/>
                </svg>

                <div class="door-panel" style="
                    position: absolute; top: 3.5%; left: 12%; width: 76%; height: 91%;
                    transform-origin: 0% 50%;
                    will-change: transform;
                    z-index: 3;
                ">
                    <svg viewBox="0 0 76 127" style="width:100%; height:100%; display:block;">
                        <rect x="0" y="0" width="76" height="127" rx="3" fill="#071526"/>
                        <rect x="9"  y="12" width="58" height="42" rx="3"
                              fill="none" stroke="rgba(100,255,218,0.4)" stroke-width="1.5"/>
                        <rect x="9"  y="66" width="58" height="49" rx="3"
                              fill="none" stroke="rgba(100,255,218,0.4)" stroke-width="1.5"/>
                        <circle cx="58" cy="64" r="7"   fill="none" stroke="#64ffda" stroke-width="2.5"/>
                        <circle cx="58" cy="64" r="2.2" fill="#64ffda"/>
                    </svg>
                </div>

            </div>

            <!-- Puerta Lottie (automatismos) -->
            <div class="door-visual door-visual--lottie door-lottie-wrap" hidden>
                <div class="door-wipe-lottie" aria-hidden="true"></div>
            </div>

        </div>

    </div>

</div>
